<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヘビゲーム</title>

  <style>
    body {
      margin: 0;
      font-family: "Yu Gothic", "Meiryo", sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game-box {
      text-align: center;
      background: #1f2937;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 18px;
    }

    canvas {
      background: #0f172a;
      border: 4px solid #4ade80;
      border-radius: 8px;
    }

    button {
      margin-top: 16px;
      padding: 10px 20px;
      border: none;
      border-radius: 999px;
      background: #4ade80;
      color: #052e16;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #86efac;
    }

    .controls {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 8px;
      justify-content: center;
    }

    .controls button {
      margin: 0;
      border-radius: 10px;
      padding: 12px;
      font-size: 20px;
    }

    .empty {
      visibility: hidden;
    }

    .message {
      margin-top: 10px;
      color: #facc15;
      font-weight: bold;
      min-height: 24px;
    }
  </style>
</head>

<body>
  <div class="game-box">
    <h1>ヘビゲーム</h1>

    <div class="info">
      <div>スコア：<span id="score">0</span></div>
      <div>最高：<span id="bestScore">0</span></div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="message" id="message">矢印キーで操作</div>

    <button onclick="restartGame()">リスタート</button>

    <div class="controls">
      <button class="empty">×</button>
      <button onclick="changeDirection('up')">▲</button>
      <button class="empty">×</button>

      <button onclick="changeDirection('left')">◀</button>
      <button onclick="changeDirection('down')">▼</button>
      <button onclick="changeDirection('right')">▶</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreElement = document.getElementById("score");
    const bestScoreElement = document.getElementById("bestScore");
    const messageElement = document.getElementById("message");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake;
    let food;
    let dx;
    let dy;
    let score;
    let bestScore = localStorage.getItem("snakeBestScore") || 0;
    let gameOver;
    let gameLoop;

    bestScoreElement.textContent = bestScore;

    function startGame() {
      snake = [
        { x: 10, y: 10 }
      ];

      food = {
        x: 5,
        y: 5
      };

      dx = 1;
      dy = 0;
      score = 0;
      gameOver = false;

      scoreElement.textContent = score;
      messageElement.textContent = "矢印キーで操作";

      clearInterval(gameLoop);
      gameLoop = setInterval(updateGame, 120);
    }

    function updateGame() {
      if (gameOver) return;

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      // 壁にぶつかったらゲームオーバー
      if (
        head.x < 0 ||
        head.x >= tileCount ||
        head.y < 0 ||
        head.y >= tileCount
      ) {
        endGame();
        return;
      }

      // 自分の体にぶつかったらゲームオーバー
      for (let i = 0; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          endGame();
          return;
        }
      }

      snake.unshift(head);

      // エサを食べたとき
      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreElement.textContent = score;
        createFood();
      } else {
        snake.pop();
      }

      drawGame();
    }

    function drawGame() {
      // 背景
      ctx.fillStyle = "#0f172a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // エサ
      ctx.fillStyle = "#f43f5e";
      ctx.fillRect(
        food.x * gridSize,
        food.y * gridSize,
        gridSize,
        gridSize
      );

      // ヘビ
      for (let i = 0; i < snake.length; i++) {
        if (i === 0) {
          ctx.fillStyle = "#22c55e";
        } else {
          ctx.fillStyle = "#86efac";
        }

        ctx.fillRect(
          snake[i].x * gridSize,
          snake[i].y * gridSize,
          gridSize - 2,
          gridSize - 2
        );
      }
    }

    function createFood() {
      food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
      };

      // エサがヘビの体の上に出ないようにする
      for (let i = 0; i < snake.length; i++) {
        if (food.x === snake[i].x && food.y === snake[i].y) {
          createFood();
          return;
        }
      }
    }

    function changeDirection(direction) {
      if (direction === "up" && dy !== 1) {
        dx = 0;
        dy = -1;
      }

      if (direction === "down" && dy !== -1) {
        dx = 0;
        dy = 1;
      }

      if (direction === "left" && dx !== 1) {
        dx = -1;
        dy = 0;
      }

      if (direction === "right" && dx !== -1) {
        dx = 1;
        dy = 0;
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowUp") {
        changeDirection("up");
      }

      if (event.key === "ArrowDown") {
        changeDirection("down");
      }

      if (event.key === "ArrowLeft") {
        changeDirection("left");
      }

      if (event.key === "ArrowRight") {
        changeDirection("right");
      }
    });

    function endGame() {
      gameOver = true;
      clearInterval(gameLoop);

      messageElement.textContent = "ゲームオーバー！リスタートできます";

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("snakeBestScore", bestScore);
        bestScoreElement.textContent = bestScore;
      }
    }

    function restartGame() {
      startGame();
    }

    startGame();
  </script>
</body>
</html>
