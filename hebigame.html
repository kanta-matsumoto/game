<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>理科スネーク - 答えて伸びる復習ゲーム</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --green: #22c55e;
      --green2: #86efac;
      --red: #fb7185;
      --yellow: #facc15;
      --blue: #38bdf8;
      --gold: #fbbf24;
      --line: rgba(255,255,255,0.16);
      --shadow: 0 24px 70px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.18), transparent 32%),
        var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .card {
      background: rgba(17, 24, 39, 0.94);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .game-card { text-align: center; }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 8px;
      font-weight: 700;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    canvas {
      width: min(100%, 440px);
      height: auto;
      aspect-ratio: 1 / 1;
      background: #020617;
      border: 4px solid var(--green);
      border-radius: 14px;
      display: block;
      margin: 0 auto;
    }

    .message {
      min-height: 28px;
      margin: 10px 0 0;
      color: var(--yellow);
      font-weight: 700;
    }

    .message.combo { color: #fef08a; }
    .message.gold { color: #fde68a; }
    .message.danger { color: #fecdd3; }

    .side h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-size: 14px;
    }

    select, button { font: inherit; }

    select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #020617;
      color: var(--text);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: var(--green);
      color: #052e16;
      font-weight: 800;
      padding: 11px 14px;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }
    button.secondary { background: #334155; color: var(--text); }
    button.danger { background: var(--red); color: #fff1f2; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 62px);
      gap: 8px;
      justify-content: center;
    }

    .controls button {
      border-radius: 14px;
      padding: 12px 0;
      font-size: 20px;
    }

    .empty { visibility: hidden; }

    .quiz-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.78);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 18px;
      z-index: 10;
    }

    .quiz {
      width: min(640px, 100%);
      background: #111827;
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .quiz.gold-quiz {
      border-color: rgba(251,191,36,0.85);
      box-shadow: 0 24px 80px rgba(251,191,36,0.20);
    }

    .quiz.revenge-quiz {
      border-color: rgba(251,113,133,0.85);
      box-shadow: 0 24px 80px rgba(251,113,133,0.18);
    }

    .quiz-tag {
      display: inline-block;
      background: rgba(56,189,248,0.16);
      color: #bae6fd;
      border: 1px solid rgba(56,189,248,0.35);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .quiz-tag.gold {
      background: rgba(251,191,36,0.16);
      color: #fef3c7;
      border-color: rgba(251,191,36,0.55);
    }

    .quiz-tag.revenge {
      background: rgba(251,113,133,0.16);
      color: #ffe4e6;
      border-color: rgba(251,113,133,0.55);
    }

    .question {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.55;
      margin: 0 0 14px;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice {
      text-align: left;
      border-radius: 14px;
      background: #1f2937;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 12px 14px;
    }

    .choice.correct {
      background: rgba(34,197,94,0.25);
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(34,197,94,0.20);
    }

    .choice.wrong {
      background: rgba(251,113,133,0.25);
      border-color: var(--red);
      box-shadow: 0 0 0 2px rgba(251,113,133,0.20);
    }

    .result-effect {
      display: none;
      margin: 0 0 14px;
      padding: 14px;
      border-radius: 16px;
      text-align: center;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      letter-spacing: 0.04em;
      animation: pop 0.28s ease-out;
    }

    .result-effect.correct {
      display: block;
      background: rgba(34,197,94,0.18);
      color: #bbf7d0;
      border: 1px solid rgba(34,197,94,0.55);
    }

    .result-effect.wrong {
      display: block;
      background: rgba(251,113,133,0.18);
      color: #ffe4e6;
      border: 1px solid rgba(251,113,133,0.55);
    }

    .result-effect.revenge {
      display: block;
      background: rgba(56,189,248,0.18);
      color: #bae6fd;
      border: 1px solid rgba(56,189,248,0.55);
    }

    @keyframes pop {
      0% { transform: scale(0.88); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .explanation {
      margin-top: 14px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(250,204,21,0.12);
      color: #fef3c7;
      line-height: 1.7;
      display: none;
    }

    #continueBtn {
      display: none;
      width: 100%;
      margin-top: 14px;
    }

    .start-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .canvas-wrap {
      position: relative;
      width: min(100%, 440px);
      margin: 0 auto;
    }

    .start-box {
      background: rgba(15,23,42,0.88);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      max-width: 320px;
    }

    .start-box strong {
      display: block;
      font-size: 20px;
      margin-bottom: 6px;
    }

    .mini-info {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .mini-info strong { color: var(--text); }

    .report-card {
      grid-column: 1 / -1;
      display: none;
    }

    .report-card h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .report-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 10px 0 14px;
    }

    .report-box {
      background: #020617;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
    }

    .report-box span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .review-item {
      background: #020617;
      border: 1px solid rgba(251,113,133,0.35);
      border-radius: 16px;
      padding: 12px;
      line-height: 1.7;
    }

    .review-item strong { color: #fecdd3; }
    .review-item .answer { color: #bbf7d0; }
    .review-item .explain { color: #fde68a; }

    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .report-summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card game-card">
      <h1>理科スネーク</h1>
      <p class="subtitle">エサを取る → 理科クイズに答える → 正解するとヘビが伸びる</p>

      <div class="stats">
        <div class="stat"><span>スコア</span><strong id="score">0</strong></div>
        <div class="stat"><span>正解数</span><strong id="correctCount">0</strong></div>
        <div class="stat"><span>ライフ</span><strong id="lives">3</strong></div>
        <div class="stat"><span>コンボ</span><strong id="comboCount">0</strong></div>
        <div class="stat"><span>最高</span><strong id="bestScore">0</strong></div>
      </div>

      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="440" height="440"></canvas>
        <div class="start-overlay" id="startOverlay">
          <div class="start-box">
            <strong>スタートを押してください</strong>
            矢印キーか下のボタンで操作します。
          </div>
        </div>
      </div>

      <p class="message" id="message">単元を選んでスタート</p>

      <div class="controls">
        <button class="empty">×</button>
        <button onclick="setDirection('up')">▲</button>
        <button class="empty">×</button>
        <button onclick="setDirection('left')">◀</button>
        <button onclick="setDirection('down')">▼</button>
        <button onclick="setDirection('right')">▶</button>
      </div>
    </section>

    <aside class="card side">
      <h2>ゲーム設定</h2>

      <label for="unitSelect">出題範囲</label>
      <select id="unitSelect">
        <option value="all">全範囲ミックス</option>
        <option value="chu1">中1理科</option>
        <option value="chu2">中2理科</option>
        <option value="chu3">中3理科</option>
        <option value="chemistry">化学</option>
        <option value="biology">生物</option>
        <option value="physics">物理</option>
        <option value="earth">地学</option>
      </select>

      <label for="speedSelect">スピード</label>
      <select id="speedSelect">
        <option value="170">ゆっくり</option>
        <option value="130" selected>ふつう</option>
        <option value="95">速い</option>
      </select>

      <div class="buttons">
        <button onclick="startGame()">スタート</button>
        <button class="secondary" onclick="pauseOrResume()">一時停止</button>
        <button class="danger" onclick="resetGame()">リセット</button>
      </div>

      <div class="mini-info">
        <strong>G</strong> はレアエサです。正解すると得点が2倍になり、少しの間スピードが下がります。
      </div>
    </aside>

    <section class="card report-card" id="reviewReport"></section>
  </main>

  <div class="quiz-backdrop" id="quizBackdrop">
    <div class="quiz" id="quizBox">
      <div class="quiz-tag" id="quizTag">理科クイズ</div>
      <div class="result-effect" id="resultEffect"></div>
      <p class="question" id="questionText"></p>
      <div class="choices" id="choices"></div>
      <div class="explanation" id="explanation"></div>
      <button id="continueBtn" onclick="continueGame()">ゲームに戻る</button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        grade: "chu1", field: "chemistry",
        q: "水にとけた物質が、再び固体として出てくる現象を何という？",
        choices: ["蒸留", "再結晶", "中和", "酸化"],
        answer: 1,
        explanation: "再結晶は、溶けていた物質を結晶として取り出す方法です。温度による溶ける量の違いを利用します。"
      },
      {
        grade: "chu1", field: "biology",
        q: "植物の葉で、光合成が主に行われる場所はどこ？",
        choices: ["気孔", "葉緑体", "根毛", "道管"],
        answer: 1,
        explanation: "光合成は葉緑体で行われます。二酸化炭素と水からデンプンなどをつくります。"
      },
      {
        grade: "chu1", field: "physics",
        q: "音の大きさと関係が深いものはどれ？",
        choices: ["振幅", "振動数", "光の速さ", "質量"],
        answer: 0,
        explanation: "音の大きさは振幅と関係します。音の高さは振動数と関係します。"
      },
      {
        grade: "chu1", field: "earth",
        q: "火山灰などが固まってできた岩石はどれ？",
        choices: ["石灰岩", "凝灰岩", "花こう岩", "チャート"],
        answer: 1,
        explanation: "凝灰岩は火山灰などが堆積して固まった岩石です。"
      },
      {
        grade: "chu1", field: "chemistry",
        q: "物質を水に入れても、それ以上溶けない状態を何という？",
        choices: ["飽和", "融解", "沸騰", "昇華"],
        answer: 0,
        explanation: "それ以上物質が溶けない状態を飽和といいます。"
      },

      {
        grade: "chu2", field: "chemistry",
        q: "酸化銅から銅を取り出すとき、酸化銅から酸素を奪う反応を何という？",
        choices: ["酸化", "還元", "中和", "蒸発"],
        answer: 1,
        explanation: "酸素を失う変化を還元といいます。酸化銅が還元されると銅になります。"
      },
      {
        grade: "chu2", field: "biology",
        q: "血液中で酸素を運ぶ主な成分はどれ？",
        choices: ["白血球", "血小板", "赤血球", "血しょう"],
        answer: 2,
        explanation: "赤血球に含まれるヘモグロビンが酸素を運びます。"
      },
      {
        grade: "chu2", field: "physics",
        q: "電流の単位はどれ？",
        choices: ["V", "A", "Ω", "W"],
        answer: 1,
        explanation: "電流の単位はアンペア A です。電圧は V、抵抗は Ω です。"
      },
      {
        grade: "chu2", field: "earth",
        q: "空気中の水蒸気が水滴になり始める温度を何という？",
        choices: ["融点", "沸点", "露点", "気圧"],
        answer: 2,
        explanation: "水蒸気が凝結し始める温度を露点といいます。"
      },
      {
        grade: "chu2", field: "chemistry",
        q: "化学変化の前後で変わらないものはどれ？",
        choices: ["物質の種類", "原子の組み合わせ", "原子の種類と数", "色"],
        answer: 2,
        explanation: "化学変化では原子の組み合わせは変わりますが、原子の種類と数は変わりません。"
      },

      {
        grade: "chu3", field: "chemistry",
        q: "酸とアルカリが反応して、水と塩ができる反応を何という？",
        choices: ["中和", "酸化", "還元", "分解"],
        answer: 0,
        explanation: "酸とアルカリが互いの性質を打ち消し合う反応を中和といいます。"
      },
      {
        grade: "chu3", field: "biology",
        q: "親の形質が子に伝わることを何という？",
        choices: ["進化", "遺伝", "消化", "分化"],
        answer: 1,
        explanation: "親の形質が子に伝わることを遺伝といいます。"
      },
      {
        grade: "chu3", field: "physics",
        q: "磁界の中でコイルを動かすと電流が流れる現象を何という？",
        choices: ["静電気", "電磁誘導", "放電", "熱伝導"],
        answer: 1,
        explanation: "コイルの中の磁界が変化すると電流が流れます。これを電磁誘導といいます。"
      },
      {
        grade: "chu3", field: "earth",
        q: "太陽のまわりを公転する天体で、地球もこれに含まれるものは？",
        choices: ["恒星", "惑星", "衛星", "星雲"],
        answer: 1,
        explanation: "地球は太陽のまわりを公転する惑星です。月は地球の衛星です。"
      },
      {
        grade: "chu3", field: "chemistry",
        q: "塩化銅水溶液を電気分解したとき、陰極に付着する物質は？",
        choices: ["銅", "塩素", "酸素", "水素"],
        answer: 0,
        explanation: "塩化銅水溶液の電気分解では、陰極に銅が付着し、陽極から塩素が発生します。"

      {
        grade: "chu3", field: "physics",
        q: "物体にはたらく重力の大きさを何という？",
        choices: ["質量", "密度", "重さ", "体積"],
        answer: 2,
        explanation: "重さは物体にはたらく重力の大きさです。質量とは区別します。"
      },
      {
              "grade": "chu1",
              "field": "chemistry",
              "q": "次の説明にあてはまる語句はどれ？「水に溶けていた物質を、温度による溶ける量の違いを利用して結晶として取り出す方法」",
              "choices": [
                      "化合物",
                      "溶媒",
                      "塩化銅",

              ],
              "answer": 3,
              "explanation": "答えは「再結晶」です。水に溶けていた物質を、温度による溶ける量の違いを利用して結晶として取り出す方法ことを表します。"
      },
      {
              "grade": "chu1",
              "field": "chemistry",
              "q": "次の説明にあてはまる語句はどれ？「液体と、水に溶けない固体をろ紙などで分ける方法」",
              "choices": [
                      "水素",
                      "電解質",
                      "ろ過",
                      "中性"
              ],
              "answer": 2,
              "explanation": "答えは「ろ過」です。液体と、水に溶けない固体をろ紙などで分ける方法ことを表します。"
      },
      {
              "grade": "chu1",
              "field": "chemistry",
              "q": "次の説明にあてはまる語句はどれ？「液体を沸騰させて出た気体を冷やし、沸点の違いで物質を分ける方法」",
              "choices": [
                      "蒸留",
                      "酸化銅",
                      "塩",
                      "酸性"
              ],
              "answer": 0,
              "explanation": "答えは「蒸留」です。液体を沸騰させて出た気体を冷やし、沸点の違いで物質を分ける方法ことを表します。"
      },
      {
              "grade": "chu1",
              "field": "chemistry",
              "q": "次の説明にあてはまる語句はどれ？「物質が水などの液体に溶けて、全体に均一に広がること」",
              "choices": [
                      "飽和水溶液",
                      "陰極",
                      "溶解",
                      "水素"

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const correctEl = document.getElementById("correctCount");
    const livesEl = document.getElementById("lives");

    const unitSelect = document.getElementById("unitSelect");
    const speedSelect = document.getElementById("speedSelect");

    const questionText = document.getElementById("questionText");
    const choicesEl = document.getElementById("choices");
    const explanationEl = document.getElementById("explanation");
    const continueBtn = document.getElementById("continueBtn");
    const startOverlay = document.getElementById("startOverlay");
    const reviewReport = document.getElementById("reviewReport");

    const grid = 22;
    const tile = canvas.width / grid;
    const normalFoodRate = 0.85;
    const slowBonusTime = 5000;
    const slowBonusMultiplier = 1.45;

    let snake, food, direction, nextDirection;
    let score = 0;
    let correctCount = 0;
    let lives = 3;
    let combo = 0;
    let timer = null;
    let slowTimer = null;
    let running = false;
    let paused = false;

    let pendingSlowBonus = false;
    let currentQuestion = null;
    let currentFoodType = "normal";
    let wrongQuestions = [];
    let wrongLog = [];

    let revengeQueue = [];
    let revengeIndex = 0;
    let bestScore = Number(localStorage.getItem("rikaSnakeBestScore") || 0);
    bestEl.textContent = bestScore;

    function drawInitial() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      ctx.fillStyle = "#22c55e";
      ctx.fillRect(10 * tile + 2, 10 * tile + 2, tile - 4, tile - 4);
      drawFoodMark({ x: 15, y: 10, type: "normal" });
    }

    function startGame() {
      clearInterval(timer);
      clearTimeout(slowTimer);
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      correctCount = 0;
      lives = 3;
      combo = 0;
      wrongQuestions = [];
      wrongLog = [];
      revengeMode = false;
      revengeQueue = [];
      revengeIndex = 0;
      slowBonusActive = false;
      pendingSlowBonus = false;
      running = true;
      paused = false;
      startOverlay.style.display = "none";
      reviewReport.style.display = "none";
      reviewReport.innerHTML = "";
      createFood();
      updateStats();
      setMessage("？マークを取ると理科クイズが出ます");
      draw();
      restartLoop(getBaseSpeed());
    }

    function resetGame() {
      clearInterval(timer);
      clearTimeout(slowTimer);
      running = false;
      paused = false;
      revengeMode = false;
      slowBonusActive = false;
      pendingSlowBonus = false;
      startOverlay.style.display = "flex";
      quizBackdrop.style.display = "none";
      reviewReport.style.display = "none";
      reviewReport.innerHTML = "";
      score = 0;
      correctCount = 0;
      lives = 3;
      combo = 0;
      wrongQuestions = [];
      wrongLog = [];
      updateStats();
      setMessage("単元を選んでスタート");
      drawInitial();
    }

    function pauseOrResume() {
      if (!running) return;
      paused = !paused;
      setMessage(paused ? "一時停止中" : "再開しました");
    }

    function gameTick() {
      if (!running || paused) return;
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (hitWall(head) || hitSelf(head)) {
        endGame("壁か自分の体にぶつかりました");
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        paused = true;
        currentFoodType = food.type;
        showQuiz();
      } else {
        snake.pop();
      }

      draw();
    }

    function hitWall(pos) {
      return pos.x < 0 || pos.x >= grid || pos.y < 0 || pos.y >= grid;
    }

    function hitSelf(pos) {
      return snake.some(part => part.x === pos.x && part.y === pos.y);
    }

    function createFood() {
      do {
        food = {
          x: Math.floor(Math.random() * grid),
          y: Math.floor(Math.random() * grid),
          type: Math.random() > normalFoodRate ? "gold" : "normal"
        };
      } while (snake && snake.some(part => part.x === food.x && part.y === food.y));
    }

    function draw() {
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFoodMark(food);

      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#22c55e" : "#86efac";
        roundRect(part.x * tile + 2, part.y * tile + 2, tile - 4, tile - 4, 5);
        ctx.fill();
      });
    }

    function drawFoodMark(targetFood) {
      if (!targetFood) return;

      const centerX = targetFood.x * tile + tile / 2;
      const centerY = targetFood.y * tile + tile / 2;
      const isGold = targetFood.type === "gold";

      ctx.fillStyle = isGold ? "#fbbf24" : "#fb7185";
      ctx.beginPath();
      ctx.arc(centerX, centerY, tile / 2.7, 0, Math.PI * 2);
      ctx.fill();

      if (isGold) {
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.fillStyle = isGold ? "#422006" : "#fff1f2";
      ctx.font = "bold 16px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(isGold ? "G" : "?", centerX, centerY + 1);
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(255,255,255,0.045)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= grid; i++) {
        ctx.beginPath();
        ctx.moveTo(i * tile, 0);
        ctx.lineTo(i * tile, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * tile);
        ctx.lineTo(canvas.width, i * tile);
        ctx.stroke();
      }
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function setDirection(dir) {
      const map = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 }
      };

      const wanted = map[dir];
      if (!wanted) return;

      if (direction && wanted.x === -direction.x && wanted.y === -direction.y) return;
      nextDirection = wanted;
    }

    document.addEventListener("keydown", event => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(event.key)) {
        event.preventDefault();
      }
      if (event.key === "ArrowUp") setDirection("up");
      if (event.key === "ArrowDown") setDirection("down");
      if (event.key === "ArrowLeft") setDirection("left");
      if (event.key === "ArrowRight") setDirection("right");
      if (event.key === " ") pauseOrResume();
    });

    speedSelect.addEventListener("change", () => {
      if (!running || slowBonusActive) return;
      restartLoop(getBaseSpeed());
    });

    function getFilteredQuestions() {
      const mode = unitSelect.value;
      if (mode === "all") return quizData;
      if (["chu1", "chu2", "chu3"].includes(mode)) {
        return quizData.filter(item => item.grade === mode);
      }
      return quizData.filter(item => item.field === mode);
    }

    function showQuiz() {
      revengeMode = false;
      const questions = getFilteredQuestions();
      currentQuestion = questions[Math.floor(Math.random() * questions.length)] || quizData[0];
      renderQuiz(currentQuestion, { mode: "normal", foodType: currentFoodType });
      setMessage(currentFoodType === "gold" ? "金色のエサです。正解すると得点2倍" : "クイズに答えてください", currentFoodType === "gold" ? "gold" : "");
    }

    function renderQuiz(question, options = {}) {
      const mode = options.mode || "normal";
      const foodType = options.foodType || "normal";
      const gradeName = { chu1: "中1", chu2: "中2", chu3: "中3" }[question.grade];
      const fieldName = { chemistry: "化学", biology: "生物", physics: "物理", earth: "地学" }[question.field];

      quizBox.classList.remove("gold-quiz", "revenge-quiz");
      quizTag.classList.remove("gold", "revenge");
      resultEffect.className = "result-effect";
      resultEffect.textContent = "";

      if (mode === "revenge") {
        quizBox.classList.add("revenge-quiz");
        quizTag.classList.add("revenge");
        quizTag.textContent = `リベンジ ${revengeIndex + 1}/${revengeQueue.length}・${gradeName}・${fieldName}`;
      } else if (foodType === "gold") {
        quizBox.classList.add("gold-quiz");
        quizTag.classList.add("gold");
        quizTag.textContent = `金色のエサ・${gradeName}・${fieldName}`;
      } else {
        quizTag.textContent = `${gradeName}・${fieldName}`;
      }

      questionText.textContent = question.q;
      choicesEl.innerHTML = "";
      explanationEl.style.display = "none";
      explanationEl.textContent = "";
      continueBtn.style.display = "none";
      continueBtn.textContent = "ゲームに戻る";

      question.choices.forEach((choice, index) => {
        const btn = document.createElement("button");
        btn.className = "choice";
        btn.textContent = `${index + 1}. ${choice}`;
        btn.onclick = () => answerQuiz(index);
        choicesEl.appendChild(btn);
      });

      quizBackdrop.style.display = "flex";
    }

    function answerQuiz(index) {
      const buttons = document.querySelectorAll(".choice");
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === currentQuestion.answer) btn.classList.add("correct");
        if (i === index && i !== currentQuestion.answer) btn.classList.add("wrong");
      });

      const isCorrect = index === currentQuestion.answer;

      if (revengeMode) {
        handleRevengeAnswer(isCorrect, index);
        return;
      }

      if (isCorrect) {
        combo += 1;
        correctCount += 1;

        let point = 10 + combo * 2;
        if (currentFoodType === "gold") {
          point *= 2;
          pendingSlowBonus = true;
        }

        score += point;
        const comboText = combo >= 2 ? `${combo}連続正解！` : "正解！";
        const goldText = currentFoodType === "gold" ? " 金色ボーナスで得点2倍。" : "";
        resultEffect.className = "result-effect correct";
        resultEffect.textContent = `◯ ${comboText}`;
        setMessage(`${comboText} +${point}点。${goldText}ヘビが伸びました`, combo >= 2 ? "combo" : "");
        explanationEl.innerHTML = `<strong>◯ 正解！</strong><br>${goldText}${currentQuestion.explanation}`;
      } else {
        lives -= 1;
        combo = 0;
        snake.pop();
        recordWrongQuestion(currentQuestion, index);
        resultEffect.className = "result-effect wrong";
        resultEffect.textContent = "× 不正解...";
        setMessage("不正解。ライフが1減り、コンボがリセットされました", "danger");
        explanationEl.innerHTML = `<strong>× 不正解...</strong><br>${currentQuestion.explanation}`;
        if (lives <= 0) {
          continueBtn.textContent = wrongQuestions.length > 0 ? "リベンジモードへ" : "結果を見る";
        }
      }

      updateStats();
      explanationEl.style.display = "block";
      continueBtn.style.display = "block";
      draw();
    }

    function handleRevengeAnswer(isCorrect, index) {
      if (isCorrect) {
        lives = 1;
        combo = 0;
        revengeMode = false;
        revengeQueue = [];
        revengeIndex = 0;
        resultEffect.className = "result-effect revenge";
        resultEffect.textContent = "◯ リベンジ成功！";
        explanationEl.innerHTML = `<strong>復活。</strong><br>${currentQuestion.explanation}`;
        continueBtn.textContent = "ライフ1で復帰する";
        setMessage("リベンジ成功。ライフ1で復帰できます", "combo");
      } else {
        resultEffect.className = "result-effect wrong";
        resultEffect.textContent = "× リベンジ失敗...";
        explanationEl.innerHTML = `<strong>もう一度確認。</strong><br>${currentQuestion.explanation}`;
        revengeIndex += 1;
        combo = 0;
        if (revengeIndex < revengeQueue.length) {
          continueBtn.textContent = "次のリベンジ問題へ";
          setMessage("次のリベンジ問題に挑戦できます", "danger");
        } else {
          continueBtn.textContent = "結果を見る";
          setMessage("リベンジ失敗。結果を確認してください", "danger");
        }
      }

      updateStats();
      explanationEl.style.display = "block";
      continueBtn.style.display = "block";
    }

    function continueGame() {
      if (revengeMode) {
        if (lives > 0) {
          quizBackdrop.style.display = "none";
          continueBtn.textContent = "ゲームに戻る";
          createFood();
          paused = false;
          setMessage("ライフ1で復帰。慎重に進もう");
          draw();
          return;
        }

        if (revengeIndex < revengeQueue.length) {
          currentQuestion = revengeQueue[revengeIndex];
          renderQuiz(currentQuestion, { mode: "revenge" });
          setMessage("リベンジ問題に答えてください", "danger");
          return;
        }

        endGame("リベンジ失敗");
        return;
      }

      quizBackdrop.style.display = "none";
      continueBtn.textContent = "ゲームに戻る";

      if (lives <= 0) {
        if (wrongQuestions.length > 0) {
          startRevengeMode();
        } else {
          endGame("ライフがなくなりました");
        }
        return;
      }

      createFood();
      if (pendingSlowBonus) {
        activateSlowBonus();
      }
      paused = false;
      setMessage(pendingSlowBonus ? "スピードダウン中。次のエサを取りに行こう" : "続けて？マークを取りに行こう");
      pendingSlowBonus = false;
      draw();
    }

    function startRevengeMode() {
      revengeMode = true;
      paused = true;
      combo = 0;
      revengeQueue = [...wrongQuestions];
      revengeIndex = 0;
      currentQuestion = revengeQueue[revengeIndex];
      renderQuiz(currentQuestion, { mode: "revenge" });
      setMessage("リベンジモード。正解すればライフ1で復帰", "danger");
      updateStats();
    }

    function recordWrongQuestion(question, selectedIndex) {
      const record = {
        ...question,
        selectedIndex,
        selectedChoice: question.choices[selectedIndex] || "未選択",
        correctChoice: question.choices[question.answer]
      };
      wrongQuestions.push(record);
      wrongLog.push(record);
    }

    function endGame(reason) {
      clearInterval(timer);
      clearTimeout(slowTimer);
      running = false;
      paused = false;
      revengeMode = false;
      slowBonusActive = false;
      pendingSlowBonus = false;
      quizBackdrop.style.display = "none";
      startOverlay.style.display = "flex";

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem("rikaSnakeBestScore", bestScore);
      }
      updateStats();
      setMessage(`ゲーム終了：${reason}。スコア ${score} 点、正解 ${correctCount} 問。`);
      showReviewReport(reason);
    }

    function showReviewReport(reason) {
      const uniqueWrong = [];
      const seen = new Set();
      wrongLog.forEach(item => {
        const key = item.q;
        if (!seen.has(key)) {
          seen.add(key);
          uniqueWrong.push(item);
        }
      });

      const itemsHtml = uniqueWrong.length === 0
        ? `<p class="mini-info">今回のプレイで間違えた問題はありません。</p>`
        : `<div class="review-list">${uniqueWrong.map((item, index) => `
            <div class="review-item">
              <strong>${index + 1}. ${escapeHtml(item.q)}</strong><br>
              あなたの答え：${escapeHtml(item.selectedChoice)}<br>
              <span class="answer">正解：${escapeHtml(item.correctChoice)}</span><br>
              <span class="explain">解説：${escapeHtml(item.explanation)}</span>
            </div>
          `).join("")}</div>`;

      reviewReport.innerHTML = `
        <h2>復習レポート</h2>
        <div class="report-summary">
          <div class="report-box"><span>最終スコア</span><strong>${score} 点</strong></div>
          <div class="report-box"><span>正解数</span><strong>${correctCount} 問</strong></div>
          <div class="report-box"><span>終了理由</span><strong>${escapeHtml(reason)}</strong></div>
        </div>
        ${itemsHtml}
      `;
      reviewReport.style.display = "block";
    }

    function updateStats() {
      scoreEl.textContent = score;
      correctEl.textContent = correctCount;
      livesEl.textContent = lives;
      comboEl.textContent = combo;
      bestEl.textContent = bestScore;
    }

    function setMessage(text, type = "") {
      messageEl.textContent = text;
      messageEl.className = type ? `message ${type}` : "message";
    }

    function getBaseSpeed() {
      return Number(speedSelect.value);
    }

    function restartLoop(intervalMs) {
      clearInterval(timer);
      timer = setInterval(gameTick, intervalMs);
    }

    function activateSlowBonus() {
      slowBonusActive = true;
      restartLoop(Math.round(getBaseSpeed() * slowBonusMultiplier));
      clearTimeout(slowTimer);
      slowTimer = setTimeout(() => {
        slowBonusActive = false;
        if (running) {
          restartLoop(getBaseSpeed());
          setMessage("スピードが元に戻りました");
        }
      }, slowBonusTime);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    drawInitial();
  </script>
</body>
</html>
